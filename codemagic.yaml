workflows:
  react-native-android:
    name: Build React Native Android App
    max_build_duration: 60
    environment:
      vars:
        NODE_ENV: production
      node: latest
      java: 17
      android: 33
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Android App
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - YOUR_EMAIL_HERE
        notify:
          success: true
          failure: true
