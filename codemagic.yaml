workflows:
  react-native-android:
    name: Build React Native Android App
    max_build_duration: 60
    environment:
      vars:
        NODE_ENV: production
      node: latest
      java: 17
      groups:
        - android          # usa o grupo pré-configurado do Codemagic
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Android App
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - mislene@gmail.com      # coloque aqui SEU email real
        notify:
          success: true
          failure: true
